title = "nSelf nTV gitleaks config"

[extend]
useDefault = true

[allowlist]
paths = [
  # Test files — mock credentials are intentional test vectors
  '''.*_test\.dart''',
  '''.*\.test\.ts''',
  '''.*\.spec\.ts''',
  '''test/''',
  '''testdata/''',
  '''\.bats$''',
  # Example and template env files — placeholder values only
  '''\.env\.example$''',
  '''\.example\.env$''',
  '''\.env\.template$''',
  '''\.env\.dev$''',
  '''\.env\.staging$''',
  # Documentation and reference files — contain example credentials and API keys
  '''docs/''',
  '''\.wiki/''',
  '''\.github/wiki/''',
  '''\.github/docs/''',
  '''\.github/workflows/''',
  '''\.claude/''',
]
