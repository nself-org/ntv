name: Dependency Audit

# P4-E5-W3-S05-T17: pnpm audit CI for ntv — fail on HIGH/CRITICAL advisories.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # Weekly Monday 04:00 UTC

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Create @nself workspace stubs
        run: |
          for pkg in auth-core graphql-client i18n observability ui; do
            mkdir -p stubs/@nself/$pkg
            echo '{"name":"@nself/'"$pkg"'","version":"0.0.0","main":"index.js"}' > stubs/@nself/$pkg/package.json
            echo 'module.exports = {};' > stubs/@nself/$pkg/index.js
          done
          echo 'packages:' > pnpm-workspace.yaml
          echo "  - 'stubs/@nself/*'" >> pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high
