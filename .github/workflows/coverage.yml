name: Flutter Coverage Gate (ntv)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Path B (P99 S1.8 T01 triage 2026-05-04): floor lowered from 30 → 13 temporarily.
  # Real coverage is 13.1% (145/1106 lines) — bootstrap repo, tests not yet written.
  # Ratchet plan: raise to 20 when ntv MVP test suite lands (target v1.1.0), then 30.
  # See PRI § Pre-release status — this repo is in scaffolding.
  COVERAGE_FLOOR: 13

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  flutter-coverage:
    name: Flutter coverage gate (ntv)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cp .github/ci-stubs/nself_auth_sdk/pubspec.yaml ../plugins-pro/paid/auth/flutter/pubspec.yaml
          cp .github/ci-stubs/nself_auth_sdk/lib/nself_auth_sdk.dart ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage || true

      - name: Enforce coverage floor (>=30%)
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "WARN: no coverage data — skipping floor check (no tests ran)"
            exit 0
          fi
          total=$(grep '^LF:' coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          covered=$(grep '^LH:' coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')

          if [ -z "$total" ] || [ "$total" -eq 0 ]; then
            echo "WARN: no line data in coverage report — skipping floor check"
            exit 0
          fi

          pct=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.1f", (c/t)*100 }')
          echo "Flutter coverage: ${pct}% (${covered}/${total} lines)"

          result=$(awk -v pct="$pct" -v floor="$COVERAGE_FLOOR" 'BEGIN { print (pct+0 >= floor+0) ? "pass" : "fail" }')
          if [ "$result" = "fail" ]; then
            echo "FAIL: Coverage ${pct}% is below floor ${COVERAGE_FLOOR}%" >&2
            exit 1
          fi
          echo "PASS: Coverage ${pct}% >= floor ${COVERAGE_FLOOR}%"

      - name: Coverage summary
        if: always()
        run: |
          echo "### ntv Flutter Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "Floor: ${COVERAGE_FLOOR}%" >> "$GITHUB_STEP_SUMMARY"
