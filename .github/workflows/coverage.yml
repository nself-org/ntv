name: Flutter Coverage Gate (ntv)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COVERAGE_FLOOR: 30

jobs:
  flutter-coverage:
    name: Flutter coverage gate (ntv)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cat > ../plugins-pro/paid/auth/flutter/pubspec.yaml <<'STUB'
          name: nself_auth_sdk
          version: 1.0.0
          publish_to: none
          environment:
            sdk: ">=3.0.0 <4.0.0"
            flutter: ">=3.10.0"
          dependencies:
            flutter:
              sdk: flutter
          dev_dependencies:
            flutter_test:
              sdk: flutter
          STUB
          cat > ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart <<'SDK'
          import 'package:flutter/foundation.dart';

          class User {
            final String id;
            final String email;
            User({required this.id, required this.email});
          }

          class StorageBackend {
            Future<String?> get(String key) async => null;
            Future<void> set(String key, String value) async {}
            Future<void> delete(String key) async {}
          }

          class InMemoryStorageBackend implements StorageBackend {
            final Map<String, String> _data = {};
            @override Future<String?> get(String key) async => _data[key];
            @override Future<void> set(String key, String value) async => _data[key] = value;
            @override Future<void> delete(String key) async => _data.remove(key);
          }

          class TokenStore {
            final StorageBackend backend;
            TokenStore({required this.backend});
            factory TokenStore.withBackend(StorageBackend backend) => TokenStore(backend: backend);
          }

          class NSelfAuth {
            static User? _currentUser;
            static String? _accessToken;
            static Future<void> initialize({
              required String authBaseUrl,
              required String appVersion,
              TokenStore? tokenStore,
            }) async {}
            static User? get currentUser => _currentUser;
            static Future<String?> getAccessToken() async => _accessToken;
            static Future<void> signOut() async {
              _currentUser = null;
              _accessToken = null;
            }
            static Future<bool> isBiometricAvailable() async => false;
            static Future<void> enableBiometricUnlock() async {}
            static Future<User?> unlockWithBiometrics() async => null;
          }
          SDK

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage || true

      - name: Enforce coverage floor (>=30%)
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "WARN: no coverage data — skipping floor check (no tests ran)"
            exit 0
          fi
          total=$(grep '^LF:' coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')
          covered=$(grep '^LH:' coverage/lcov.info | awk -F: '{sum += $2} END {print sum}')

          if [ -z "$total" ] || [ "$total" -eq 0 ]; then
            echo "WARN: no line data in coverage report — skipping floor check"
            exit 0
          fi

          pct=$(awk -v c="$covered" -v t="$total" 'BEGIN { printf "%.1f", (c/t)*100 }')
          echo "Flutter coverage: ${pct}% (${covered}/${total} lines)"

          result=$(awk -v pct="$pct" -v floor="$COVERAGE_FLOOR" 'BEGIN { print (pct+0 >= floor+0) ? "pass" : "fail" }')
          if [ "$result" = "fail" ]; then
            echo "FAIL: Coverage ${pct}% is below floor ${COVERAGE_FLOOR}%" >&2
            exit 1
          fi
          echo "PASS: Coverage ${pct}% >= floor ${COVERAGE_FLOOR}%"

      - name: Coverage summary
        if: always()
        run: |
          echo "### ntv Flutter Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "Floor: ${COVERAGE_FLOOR}%" >> "$GITHUB_STEP_SUMMARY"
