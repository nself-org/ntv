name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cat > ../plugins-pro/paid/auth/flutter/pubspec.yaml <<'STUB'
          name: nself_auth_sdk
          version: 1.0.0
          publish_to: none
          environment:
            sdk: ">=3.0.0 <4.0.0"
            flutter: ">=3.10.0"
          dependencies:
            flutter:
              sdk: flutter
          dev_dependencies:
            flutter_test:
              sdk: flutter
          STUB
          cat > ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart <<'SDK'
          import 'package:flutter/foundation.dart';

          class User {
            final String id;
            final String email;
            final String displayName;
            final String tier;
            final List<String> activePlugins;
            final DateTime? accessTokenExpiry;

            User({
              required this.id,
              required this.email,
              required this.displayName,
              required this.tier,
              required this.activePlugins,
              this.accessTokenExpiry,
            });
          }

          class StorageBackend {
            Future<String?> get(String key) async => null;
            Future<void> set(String key, String value) async {}
            Future<void> delete(String key) async {}
          }

          class InMemoryStorageBackend implements StorageBackend {
            final Map<String, String> _data = {};
            @override Future<String?> get(String key) async => _data[key];
            @override Future<void> set(String key, String value) async => _data[key] = value;
            @override Future<void> delete(String key) async => _data.remove(key);
          }

          class TokenStore {
            final StorageBackend backend;
            TokenStore({required this.backend});
            factory TokenStore.withBackend(StorageBackend backend) => TokenStore(backend: backend);

            Future<void> saveUser(User user) async {}
            Future<void> saveAccessToken(String token) async {}
            Future<void> saveRefreshToken(String? token) async {}
            Future<User?> getUser() async => null;
            Future<String?> getAccessToken() async => null;
          }

          class NSelfAuth {
            static User? _currentUser;
            static String? _accessToken;

            static Future<void> initialize({
              required String authBaseUrl,
              required String appVersion,
              TokenStore? tokenStore,
            }) async {}

            static User? get currentUser => _currentUser;
            static Future<String?> getAccessToken() async => _accessToken;

            static Future<void> signOut() async {
              _currentUser = null;
              _accessToken = null;
            }

            static Future<bool> isBiometricAvailable() async => false;
            static Future<void> enableBiometricUnlock() async {}
            static Future<User?> unlockWithBiometrics() async => _currentUser;
            static void dispose() {}
          }
          SDK
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib/ test/
      - run: flutter analyze --fatal-infos

  test:
    name: Tests (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cat > ../plugins-pro/paid/auth/flutter/pubspec.yaml <<'STUB'
          name: nself_auth_sdk
          version: 1.0.0
          publish_to: none
          environment:
            sdk: ">=3.0.0 <4.0.0"
            flutter: ">=3.10.0"
          dependencies:
            flutter:
              sdk: flutter
          dev_dependencies:
            flutter_test:
              sdk: flutter
          STUB
          cat > ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart <<'SDK'
          import 'package:flutter/foundation.dart';

          class User {
            final String id;
            final String email;
            final String displayName;
            final String tier;
            final List<String> activePlugins;
            final DateTime? accessTokenExpiry;

            User({
              required this.id,
              required this.email,
              required this.displayName,
              required this.tier,
              required this.activePlugins,
              this.accessTokenExpiry,
            });
          }

          class StorageBackend {
            Future<String?> get(String key) async => null;
            Future<void> set(String key, String value) async {}
            Future<void> delete(String key) async {}
          }

          class InMemoryStorageBackend implements StorageBackend {
            final Map<String, String> _data = {};
            @override Future<String?> get(String key) async => _data[key];
            @override Future<void> set(String key, String value) async => _data[key] = value;
            @override Future<void> delete(String key) async => _data.remove(key);
          }

          class TokenStore {
            final StorageBackend backend;
            TokenStore({required this.backend});
            factory TokenStore.withBackend(StorageBackend backend) => TokenStore(backend: backend);

            Future<void> saveUser(User user) async {}
            Future<void> saveAccessToken(String token) async {}
            Future<void> saveRefreshToken(String? token) async {}
            Future<User?> getUser() async => null;
            Future<String?> getAccessToken() async => null;
          }

          class NSelfAuth {
            static User? _currentUser;
            static String? _accessToken;

            static Future<void> initialize({
              required String authBaseUrl,
              required String appVersion,
              TokenStore? tokenStore,
            }) async {}

            static User? get currentUser => _currentUser;
            static Future<String?> getAccessToken() async => _accessToken;

            static Future<void> signOut() async {
              _currentUser = null;
              _accessToken = null;
            }

            static Future<bool> isBiometricAvailable() async => false;
            static Future<void> enableBiometricUnlock() async {}
            static Future<User?> unlockWithBiometrics() async => _currentUser;
            static void dispose() {}
          }
          SDK
      - run: flutter pub get
      - name: Run unit + widget tests with coverage
        run: flutter test --coverage --reporter=expanded
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.platform == 'android'
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

