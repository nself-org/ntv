name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  analyze:
    name: Analyze & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cp .github/ci-stubs/nself_auth_sdk/pubspec.yaml ../plugins-pro/paid/auth/flutter/pubspec.yaml
          cp .github/ci-stubs/nself_auth_sdk/lib/nself_auth_sdk.dart ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart
      - run: flutter pub get
      - name: Auto-format and verify
        run: |
          dart format lib/ test/
          if ! git diff --exit-code lib/ test/ > /dev/null 2>&1; then
            echo "⚠️  dart format changed files. Run 'dart format lib/ test/' locally and commit:"
            git diff --name-only lib/ test/
            echo "Proceeding with auto-formatted code for analysis."
          else
            echo "✅ All files already formatted."
          fi
      - run: flutter analyze --fatal-infos

  test:
    name: Tests (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: ios
            os: macos-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cp .github/ci-stubs/nself_auth_sdk/pubspec.yaml ../plugins-pro/paid/auth/flutter/pubspec.yaml
          cp .github/ci-stubs/nself_auth_sdk/lib/nself_auth_sdk.dart ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart
      - run: flutter pub get
      - name: Run unit + widget tests with coverage
        run: flutter test --coverage --reporter=expanded
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: matrix.platform == 'android'
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  build-free:
    name: Build free / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [analyze]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: apk
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cp .github/ci-stubs/nself_auth_sdk/pubspec.yaml ../plugins-pro/paid/auth/flutter/pubspec.yaml
          cp .github/ci-stubs/nself_auth_sdk/lib/nself_auth_sdk.dart ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart
      - run: flutter pub get
      - name: Build ${{ matrix.platform }} (free flavor)
        run: flutter build ${{ matrix.platform }} --dart-define=FLAVOR=free --release

  build-pro:
    name: Build pro / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [analyze]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: apk
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          cache: true
      - name: Create stub nself_auth_sdk for CI (plugins-pro not accessible)
        run: |
          mkdir -p ../plugins-pro/paid/auth/flutter/lib
          cp .github/ci-stubs/nself_auth_sdk/pubspec.yaml ../plugins-pro/paid/auth/flutter/pubspec.yaml
          cp .github/ci-stubs/nself_auth_sdk/lib/nself_auth_sdk.dart ../plugins-pro/paid/auth/flutter/lib/nself_auth_sdk.dart
      - run: flutter pub get
      - name: Build ${{ matrix.platform }} (pro flavor)
        run: flutter build ${{ matrix.platform }} --dart-define=FLAVOR=pro --release
