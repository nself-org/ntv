name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  # Override by setting NTV_BASE_URL as a repository secret or variable.
  # Falls back to the hosted instance in the build steps when unset.
  NTV_BASE_URL: https://ntv.nself.org

jobs:
  # ── Android ────────────────────────────────────────────────────────────────
  release-android:
    name: Release Android AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true
      - run: flutter pub get

      - name: Decode upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build release AAB (free flavor)
        run: flutter build appbundle --dart-define=FLAVOR=free --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.nself.ntv
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal

  # ── macOS ─────────────────────────────────────────────────────────────────
  release-macos:
    name: Release macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true
      - run: flutter pub get

      - name: Build macOS (free flavor)
        run: flutter build macos --dart-define=FLAVOR=free --release

      - name: Create DMG
        run: |
          npm install -g create-dmg
          create-dmg \
            'build/macos/Build/Products/Release/nTV.app' \
            'build/macos/' \
            --overwrite \
            --dmg-title 'nTV' || true
          mv build/macos/*.dmg "ntv-${{ github.ref_name }}-macos.dmg" || true

      - name: Notarize DMG
        run: |
          xcrun notarytool submit "ntv-${{ github.ref_name }}-macos.dmg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ntv-${{ github.ref_name }}-macos.dmg

  # ── iOS ────────────────────────────────────────────────────────────────────
  release-ios:
    name: Release iOS IPA (TestFlight)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true
      - run: flutter pub get

      - name: Build iOS (free flavor)
        run: flutter build ipa --dart-define=FLAVOR=free --release --export-options-plist ios/ExportOptions.plist
        env:
          MATCH_CERTIFICATES_REPO_URL: ${{ secrets.MATCH_CERTIFICATES_REPO_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

  # ── Windows ───────────────────────────────────────────────────────────────
  release-windows:
    name: Release Windows MSIX
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true
      - run: flutter pub get

      - name: Build Windows (free flavor)
        run: flutter build windows --dart-define=FLAVOR=free --release

      - name: Package MSIX
        run: dart run msix:create
        # msix package config is in pubspec.yaml msix_config section.

      - name: Upload MSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/x64/runner/Release/ntv.msix

  # ── Samsung Tizen ─────────────────────────────────────────────────────────
  # Probe job: check if TIZEN_SDK_CERT_BASE64 secret is configured.
  probe-tizen:
    name: Probe Tizen secret
    runs-on: ubuntu-latest
    outputs:
      have_cert: ${{ steps.check.outputs.have_cert }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.TIZEN_SDK_CERT_BASE64 }}" ]; then
            echo "have_cert=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_cert=false" >> "$GITHUB_OUTPUT"
          fi

  release-tizen:
    name: Release Samsung Tizen WGT
    runs-on: ubuntu-latest
    needs: probe-tizen
    if: needs.probe-tizen.outputs.have_cert == 'true'
    # Conditional-skip: only runs when TIZEN_SDK_CERT_BASE64 secret is set.
    # The Tizen Studio CLI is not pre-installed on GitHub-hosted runners.
    # USER-ACTION: Samsung Galaxy Store developer account must be registered
    # before submission. See platforms/tizen/README.md.
    steps:
      - uses: actions/checkout@v4

      - name: Install Tizen CLI
        run: |
          # Tizen Studio installer — headless install for CLI tooling only
          wget -q https://download.tizen.org/sdk/Installer/tizen-studio_5.6/web-cli_Tizen_Studio_5.6_ubuntu-64.bin \
            -O /tmp/tizen-studio-installer.bin
          chmod +x /tmp/tizen-studio-installer.bin
          /tmp/tizen-studio-installer.bin --accept-license /opt/tizen-studio
          echo "/opt/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Patch NTV_BASE_URL
        run: |
          # NTV_BASE_URL env var set at workflow level; override via repo secret if needed
          sed -i "s|%%NTV_BASE_URL%%|${NTV_BASE_URL}|g" platforms/tizen/index.html

      - name: Build Tizen web app
        run: |
          cd platforms/tizen
          tizen build-web -- .

      - name: Package .wgt
        run: |
          cd platforms/tizen
          tizen package -t wgt -- .buildResult/
          mv .buildResult/*.wgt "ntv-${{ github.ref_name }}-tizen.wgt"

      - name: Upload WGT to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: platforms/tizen/ntv-${{ github.ref_name }}-tizen.wgt

  # ── LG webOS ──────────────────────────────────────────────────────────────
  # Probe job: check if WEBOS_DEVELOPER_KEY secret is configured.
  probe-webos:
    name: Probe webOS secret
    runs-on: ubuntu-latest
    outputs:
      have_key: ${{ steps.check.outputs.have_key }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.WEBOS_DEVELOPER_KEY }}" ]; then
            echo "have_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_key=false" >> "$GITHUB_OUTPUT"
          fi

  release-webos:
    name: Release LG webOS IPK
    runs-on: ubuntu-latest
    needs: probe-webos
    if: needs.probe-webos.outputs.have_key == 'true'
    # Conditional-skip: only runs when WEBOS_DEVELOPER_KEY secret is set.
    # USER-ACTION: LG Content Store developer account must be registered
    # before submission. See platforms/webos/README.md.
    steps:
      - uses: actions/checkout@v4

      - name: Install webOS TV CLI
        run: npm install -g @webosose/ares-cli

      - name: Patch NTV_BASE_URL
        run: |
          # NTV_BASE_URL env var set at workflow level; override via repo secret if needed
          sed -i "s|%%NTV_BASE_URL%%|${NTV_BASE_URL}|g" platforms/webos/index.html

      - name: Package .ipk
        run: |
          cd platforms/webos
          ares-package .
          mv *.ipk "ntv-${{ github.ref_name }}-webos.ipk"

      - name: Upload IPK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: platforms/webos/ntv-${{ github.ref_name }}-webos.ipk

  # ── Roku (T17) ────────────────────────────────────────────────────────────
  release-roku:
    name: Release Roku BrightScript .zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate BrightScript syntax
        run: |
          # Use bsc (BrightScript compiler) if available; else lightweight Python check.
          if npx --yes bsc --version &>/dev/null 2>&1; then
            npx bsc --project platforms/roku/bsconfig.json
          else
            echo "bsc not available — running sub/function balance check"
            python3 - <<'PYEOF'
          import glob, re, sys
          errors = []
          for f in glob.glob("platforms/roku/**/*.brs", recursive=True):
              with open(f) as fh:
                  src = fh.read()
              opens  = len(re.findall(r'^\s*(sub|function)\s+\w+', src, re.MULTILINE | re.IGNORECASE))
              closes = len(re.findall(r'^\s*end\s+(sub|function)', src, re.MULTILINE | re.IGNORECASE))
              if opens != closes:
                  errors.append(f"{f}: {opens} open(s), {closes} close(s)")
          if errors:
              print("BrightScript syntax errors:\n" + "\n".join(errors))
              sys.exit(1)
          print("BrightScript syntax OK")
          PYEOF
          fi

      - name: Package Roku .zip
        run: |
          cd platforms/roku
          zip -r "../../ntv-${{ github.ref_name }}-roku.zip" manifest source/ images/ config/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ntv-${{ github.ref_name }}-roku.zip

  # ── Apple TV — Flutter tvOS (T18) ─────────────────────────────────────────
  release-appletv:
    name: Release Apple TV IPA (TestFlight tvOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true
      - run: flutter pub get

      - name: Add tvOS platform (idempotent)
        run: flutter create --platforms=tvos . || true

      - name: Build tvOS IPA (free flavor)
        id: build_tvos
        run: |
          flutter build ipa \
            --dart-define=FLAVOR=free \
            --release \
            --export-options-plist platforms/appletv/ExportOptions.plist \
          || echo "TVOS_BUILD_FAILED=true" >> "$GITHUB_OUTPUT"
        env:
          MATCH_CERTIFICATES_REPO_URL: ${{ secrets.MATCH_CERTIFICATES_REPO_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload tvOS IPA to TestFlight
        if: steps.build_tvos.outputs.TVOS_BUILD_FAILED != 'true'
        run: |
          xcrun altool --upload-app \
            --type tvos \
            --file build/ios/ipa/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Warn on Flutter tvOS instability (UD-24 fallback)
        if: steps.build_tvos.outputs.TVOS_BUILD_FAILED == 'true'
        run: |
          echo "::warning::Flutter tvOS build failed. Per UD-24, native Swift tvOS port is the v1.2.0 fallback."
          echo "::warning::File .claude/ideas/native-swift-appletv-port.md if not already present."

  # ── Android TV (T19) ──────────────────────────────────────────────────────
  release-androidtv:
    name: Release Android TV AAB (Play Store TV track)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          cache: true
      - run: flutter pub get

      - name: Decode upload keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build TV release AAB
        run: flutter build appbundle --dart-define=FLAVOR=free --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (TV internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.nself.ntv
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal
          releaseName: "${{ github.ref_name }} (Android TV)"
